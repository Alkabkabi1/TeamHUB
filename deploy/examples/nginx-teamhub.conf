# TeamHUB — Nginx site configuration (example)
#
# Install: sudo cp deploy/examples/nginx-teamhub.conf /etc/nginx/sites-available/teamhub
#          sudo ln -s /etc/nginx/sites-available/teamhub /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - Octane listening on 127.0.0.1:8000 (see teamhub-octane.service)
#   - TLS certificates (certbot or provider-managed)
#   - Replace teamhub.example.com and certificate paths

upstream teamhub_octane {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name teamhub.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name teamhub.example.com;

    root /var/www/teamhub/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/teamhub.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teamhub.example.com/privkey.pem;

    # Security headers — see SECURITY.md
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets (Vite build output)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        try_files $uri =404;
    }

    # Health check — can be monitored externally
    location = /up {
        proxy_pass http://teamhub_octane;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Application traffic → Octane
    location / {
        proxy_pass http://teamhub_octane;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    client_max_body_size 20M;
}
