[phases.setup]
nixPkgs = [
    "php84",
    "php84Packages.composer",
    "php84Extensions.fileinfo",
    "php84Extensions.gd",
    "php84Extensions.zip",
    "php84Extensions.curl",
    "php84Extensions.mbstring",
    "php84Extensions.intl",
    "php84Extensions.pgsql",
    "php84Extensions.pdo_pgsql",
    "php84Extensions.redis",
    "php84Extensions.bcmath",
    "php84Extensions.xml",
    "php84Extensions.dom",
    "php84Extensions.tokenizer",
    "php84Extensions.pcntl",
    "php84Extensions.exif",
    "nginx",
    "python311Packages.supervisor",
    "nodejs_22",
]

[phases.install]
cmds = [
    "php -v && php --ini",
    "composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction",
    "npm ci --no-audit --no-fund --loglevel=error",
]

[phases.build]
cmds = [
    # Cache configs for prod (runtime `optimize` re-caches with live env)
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",

    # Filament
    "php artisan filament:optimize",

    # Frontend build (Inertia + Svelte client bundle; no SSR)
    "npm run build",

    # supervisor assets
    "mkdir -p /etc/supervisor/conf.d/",
    "cp /assets/worker-*.conf /etc/supervisor/conf.d/",
    "cp /assets/supervisord.conf /etc/supervisord.conf",
    "chmod +x /assets/start.sh"
]

[start]
cmd = "/assets/start.sh"

[staticAssets]
"start.sh" = '''
#!/bin/bash
set -e

# --- ensure Laravel writable paths (volume may be empty on first boot)
mkdir -p /app/storage/framework/{cache,sessions,views} \
         /app/storage/logs \
         /app/storage/app/{private,private/livewire-tmp,public} \
         /app/bootstrap/cache
chown -R www-data:www-data /app/storage /app/bootstrap/cache || true
chmod -R 777 /app/storage /app/bootstrap/cache

# --- ensure the application database exists on the shared Postgres server.
# Postgres only creates POSTGRES_DB on first init, so a dedicated logical DB
# for this app must be created explicitly. Idempotent.
php -r '
$h=getenv("DB_HOST"); $p=getenv("DB_PORT")?:"5432";
$u=getenv("DB_USERNAME"); $pw=getenv("DB_PASSWORD"); $db=getenv("DB_DATABASE");
if(!$h||!$u||!$db){fwrite(STDERR,"[db-ensure] missing DB_* env, skipping\n");exit(0);}
try{
    $pdo=new PDO("pgsql:host=$h;port=$p;dbname=postgres",$u,$pw,[PDO::ATTR_ERRMODE=>PDO::ERRMODE_EXCEPTION]);
    $st=$pdo->prepare("SELECT 1 FROM pg_database WHERE datname = ?");
    $st->execute([$db]);
    if(!$st->fetchColumn()){
        $safe=str_replace("\"","",$db);
        $pdo->exec("CREATE DATABASE \"$safe\"");
        echo "[db-ensure] created database $db\n";
    } else {
        echo "[db-ensure] database $db already exists\n";
    }
}catch(Throwable $e){ fwrite(STDERR,"[db-ensure] ".$e->getMessage()."\n"); }
'

# Storage symlink (idempotent)
php artisan storage:link || true

# Clear cached views (safe on first boot)
php artisan view:clear || true

# Clear the application cache so deploy-time data never serves stale across
# releases — notably the per-locale translation groups cached by
# App\Support\LoadsTranslations (1h TTL), which otherwise hide newly added
# translation keys until the cache expires.
php artisan cache:clear || true

# Database migration / seeding.
#
# When SEED_ON_DEPLOY=true, DROP and rebuild the schema and seed a fresh dataset
# (matches local). DESTRUCTIVE — intended for staging; set the flag back to
# false once the data is in place so normal deploys only run new migrations.
# Not guarded with `|| true`: if a fresh+seed was explicitly requested and
# fails, the deploy should fail loudly rather than boot with partial data.
if [ "${SEED_ON_DEPLOY:-false}" = "true" ]; then
    echo "===== [seed] SEED_ON_DEPLOY=true -> migrate:fresh --seed (DESTRUCTIVE) ====="
    set +e
    php artisan migrate:fresh --force --seed --no-interaction 2>&1 | sed 's/^/[SEEDLOG] /'
    seed_rc=${PIPESTATUS[0]}
    set -e
    echo "===== [seed] finished rc=${seed_rc} ====="
else
    php artisan migrate --force || true
fi

# Optimize app (config, routes, events, views) with live runtime env
php artisan optimize

# Render the nginx config with the runtime port Coolify provides.
sed "s/__PORT__/${PORT:-3000}/g" /assets/nginx.template.conf > /etc/nginx.conf

# Start supervisor (nginx, php-fpm, queue, scheduler)
exec supervisord -c /etc/supervisord.conf -n

'''

"supervisord.conf" = '''
[unix_http_server]
file=/assets/supervisor.sock

[supervisord]
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/assets/supervisord.pid
nodaemon=false
silent=false
minfds=1024
minprocs=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///assets/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
'''

"php-fpm.conf" = '''
[global]
daemonize = no
error_log = /dev/stderr
log_level = notice

[www]
listen = 127.0.0.1:9000
user = www-data
group = www-data
listen.owner = www-data
listen.group = www-data
pm = dynamic
pm.max_children = 12
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500
; Pass the container environment (DB_*, REDIS_*, AI keys, …) through to PHP.
clear_env = no
catch_workers_output = yes
php_admin_value[memory_limit] = 256M
php_admin_value[upload_max_filesize] = 30M
php_admin_value[post_max_size] = 35M
php_admin_value[max_execution_time] = 300
'''

"nginx.template.conf" = '''
worker_processes auto;
daemon off;
pid /tmp/nginx.pid;
error_log /dev/stderr info;

events {
    worker_connections 2048;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Self-contained MIME map (avoids depending on the nix store path).
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json map webmanifest;
        image/svg+xml                         svg svgz;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/gif                             gif;
        image/webp                            webp;
        image/avif                            avif;
        image/x-icon                          ico;
        font/woff                             woff;
        font/woff2                            woff2;
        font/ttf                              ttf;
        application/pdf                       pdf;
        application/wasm                      wasm;
        text/plain                            txt;
    }
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 35M;
    charset utf-8;

    server {
        listen __PORT__;
        server_name _;
        root /app/public;
        index index.php;

        add_header X-Content-Type-Options "nosniff";

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        error_page 404 /index.php;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;

            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param QUERY_STRING $query_string;
            fastcgi_param REQUEST_METHOD $request_method;
            fastcgi_param CONTENT_TYPE $content_type;
            fastcgi_param CONTENT_LENGTH $content_length;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param DOCUMENT_URI $document_uri;
            fastcgi_param DOCUMENT_ROOT $document_root;
            fastcgi_param SERVER_PROTOCOL $server_protocol;
            fastcgi_param REQUEST_SCHEME $scheme;
            fastcgi_param GATEWAY_INTERFACE CGI/1.1;
            fastcgi_param SERVER_SOFTWARE nginx;
            fastcgi_param REMOTE_ADDR $remote_addr;
            fastcgi_param REMOTE_PORT $remote_port;
            fastcgi_param SERVER_ADDR $server_addr;
            fastcgi_param SERVER_PORT $server_port;
            fastcgi_param SERVER_NAME $server_name;
            fastcgi_param REDIRECT_STATUS 200;
            fastcgi_param HTTP_PROXY "";

            # Allow long model responses; the app opts out of buffering for SSE
            # via the X-Accel-Buffering: no response header.
            fastcgi_read_timeout 300;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
'''

"worker-nginx.conf" = '''
[program:worker-nginx]
command=nginx -c /etc/nginx.conf
autostart=true
autorestart=true
startretries=10
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
'''

"worker-phpfpm.conf" = '''
[program:worker-phpfpm]
command=php-fpm -y /assets/php-fpm.conf -F
autostart=true
autorestart=true
startretries=10
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
'''

"worker-queue.conf" = '''
[program:worker-queue]
process_name=%(program_name)s
command=bash -c 'exec php /app/artisan queue:work --sleep=3 --tries=3 --max-time=3600'
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/worker-queue.log
stderr_logfile=/var/log/worker-queue.log
'''

"worker-scheduler.conf" = '''
[program:worker-scheduler]
process_name=%(program_name)s
command=bash -c 'exec php /app/artisan schedule:work'
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/worker-scheduler.log
stderr_logfile=/var/log/worker-scheduler.log
'''
